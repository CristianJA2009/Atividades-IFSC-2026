<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>CADASTRO</title>
    <link rel="stylesheet" href="Atividade 20-02.css"> <!-- Classe do CSS -->
</head>

<body>
    <div class="column">
    <div class="celular"> <!-- Divisão com classe CSS de Celular -->
        <h2>Login😊</h2> <!-- Título Secundário, escrito Login-->
        <input type="text" placeholder="Usuário"> <!-- Input de texto com o fundo provisório de Usuário -->
        <input type="password" placeholder="Senha"> <!-- Input de senha, que não mostra os caracteres -->
        <button>Entrar</button> <!-- Botão simples -->
        <button class="b2">Criar Conta</button>
    </div>
    <div class="cadastro">
        <h2>Cadastro</h2>
        <input type="text" placeholder="Nome de Usuário">
        <input type="email" placeholder="seuemail@gmail.com"> 
        <input type="password" placeholder="Senha">
        <p><a href="">Esqueci minha senha</a></p>
        <input type="submit" value="Cadastrar">
    </div>
    </div>
</body>

</html>
